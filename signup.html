<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000000,#0f2027,#00ffcc);
    font-family:Arial;
}

/* Big card */
.container{
    width:400px;
    padding:40px;
    background:rgba(0,0,0,0.8);
    border-radius:20px;
    box-shadow:0 0 25px #00ffcc;
    text-align:center;
}

/* Heading */
h1{
    color:#00ffcc;
    margin-bottom:20px;
    font-size:32px;
}

/* Inputs */
input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

/* Button */
button{
    width:100%;
    padding:15px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}
button:hover{
    background:#00ccff;
    color:white;
}

a{
    color:#00ffcc;
    text-decoration:none;
}

#msg{
    margin-top:10px;
    color:#ff6666;
}
</style>
</head>
<body>

<div class="container">
<h1>Create Account</h1>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<p id="msg"></p>
<p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
function signup(){
    let users = JSON.parse(localStorage.getItem("users") || "[]");

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!name || !email || !password){
        document.getElementById("msg").innerText="Fill all fields!";
        return;
    }

    users.push({name,email,password});
    localStorage.setItem("users",JSON.stringify(users));

    document.getElementById("msg").innerText="Signup Success!";
    setTimeout(()=>window.location="login.html",1000);
}
</script>

</body>
</html>
